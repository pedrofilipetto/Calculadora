<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="calculadora">
      <div class="resultado">0</div>

      <div class="bloco_botoes">
        <button class="botao preto_roxo">CE</button>
        <button class="botao preto">C</button>
        <button class="botao preto">%</button>
        <button class="botao roxo">÷</button>

        <button class="botao preto">7</button>
        <button class="botao preto">8</button>
        <button class="botao preto">9</button>
        <button class="botao roxo">X</button>

        <button class="botao preto">4</button>
        <button class="botao preto">5</button>
        <button class="botao preto">6</button>
        <button class="botao roxo">-</button>

        <button class="botao preto">1</button>
        <button class="botao preto">2</button>
        <button class="botao preto">3</button>
        <button class="botao roxo">+</button>

        <button class="botao preto">+/-</button>
        <button class="botao preto">0</button>
        <button class="botao preto">,</button>
        <button class="botao roxo_claro">=</button>
      </div>
    </div>
  </body>
</html>
