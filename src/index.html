<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="calculadora">
      <div id="tela" class="tela"></div>

      <div class="bloco_botoes">
        <button class="botao preto_roxo" onclick="apagarUltimoNum()">CE</button>
        <button class="botao preto" onclick="apagar()">C</button>
        <button class="botao preto" onclick="imprimirValor('%')">%</button>
        <button class="botao roxo" onclick="imprimirValor('÷')">÷</button>

        <button class="botao preto" onclick="imprimirValor('7')">7</button>
        <button class="botao preto" onclick="imprimirValor('8')">8</button>
        <button class="botao preto" onclick="imprimirValor('9')">9</button>
        <button class="botao roxo" onclick="imprimirValor('x')">x</button>

        <button class="botao preto" onclick="imprimirValor('4')">4</button>
        <button class="botao preto" onclick="imprimirValor('5')">5</button>
        <button class="botao preto" onclick="imprimirValor('6')">6</button>
        <button class="botao roxo" onclick="imprimirValor('-')">-</button>

        <button class="botao preto" onclick="imprimirValor('1')">1</button>
        <button class="botao preto" onclick="imprimirValor('2')">2</button>
        <button class="botao preto" onclick="imprimirValor('3')">3</button>
        <button class="botao roxo" onclick="imprimirValor('+')">+</button>

        <button class="botao preto" onclick="inverteOperador()">+/-</button>
        <button class="botao preto" onclick="imprimirValor('0')">0</button>
        <button class="botao preto" onclick="imprimirValor(',')">,</button>
        <button class="botao roxo_claro" onclick="resultado()">=</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
